<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Balap Adiwiyata</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(#a8dadc, #457b9d);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .game-container {
      background: #f1faee;
      width: 900px;
      max-width: 95%;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #1d3557;
    }

    p {
      text-align: center;
      color: #457b9d;
      margin-bottom: 10px;
    }

    .info {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      margin-bottom: 10px;
      color: #1d3557;
    }

    canvas {
      background: #2b2b2b;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      border: 4px solid #1d3557;
    }

    .footer {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      color: #1d3557;
    }

    button {
      display: block;
      margin: 10px auto 0;
      padding: 10px 20px;
      font-size: 16px;
      background: #1d3557;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0b2545;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>ECOBIKE Adiwiyata 🏁🌱</h1>
    <p>Kendarai motor ramah lingkungan dan kumpulkan POINT hijau!</p>

    <div class="info">
      <div>Skor: <span id="score">0</span></div>
      <div>Nyawa: <span id="life">3</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <button onclick="restartGame()">Restart Game</button>

    <div class="footer">© Game Edukasi Adiwiyata</div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let score = 0;
    let life = 3;
    let gameSpeed = 4;
    let gameOver = false;

    const player = {
      x: 380,
      y: 300,
      width: 40,
      height: 60,
      speed: 6
    };

    const obstacles = [];
    const greenItems = [];

    document.addEventListener("keydown", movePlayer);

    function movePlayer(e) {
      if (gameOver) return;
      if (e.key === "ArrowLeft" && player.x > 200) player.x -= player.speed;
      if (e.key === "ArrowRight" && player.x < 560) player.x += player.speed;
    }

    function drawRoad() {
      ctx.fillStyle = "#444";
      ctx.fillRect(200, 0, 400, canvas.height);

      ctx.strokeStyle = "white";
      ctx.lineWidth = 4;
      ctx.setLineDash([20, 20]);
      ctx.beginPath();
      ctx.moveTo(400, 0);
      ctx.lineTo(400, canvas.height);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawPlayer() {
      ctx.fillStyle = "#2a9d8f";
      ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    function createObstacle() {
      const x = 220 + Math.random() * 340;
      obstacles.push({ x: x, y: -60, width: 40, height: 60 });
    }

    function createGreenItem() {
      const x = 220 + Math.random() * 340;
      greenItems.push({ x: x, y: -40, size: 30 });
    }

    function drawObstacles() {
      ctx.fillStyle = "#e63946";
      obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.width, o.height));
    }

    function drawGreenItems() {
      ctx.fillStyle = "#52b788";
      greenItems.forEach(i => ctx.fillRect(i.x, i.y, i.size, i.size));
    }

    function updateObjects() {
      obstacles.forEach(o => (o.y += gameSpeed));
      greenItems.forEach(i => (i.y += gameSpeed));

      for (let i = obstacles.length - 1; i >= 0; i--) {
        if (collision(player, obstacles[i])) {
          obstacles.splice(i, 1);
          life--;
          document.getElementById("life").textContent = life;
          if (life <= 0) gameOver = true;
        } else if (obstacles[i].y > canvas.height) {
          obstacles.splice(i, 1);
        }
      }

      for (let i = greenItems.length - 1; i >= 0; i--) {
        if (collision(player, greenItems[i])) {
          greenItems.splice(i, 1);
          score += 10;
          document.getElementById("score").textContent = score;
        } else if (greenItems[i].y > canvas.height) {
          greenItems.splice(i, 1);
        }
      }
    }

    function collision(a, b) {
      return (
        a.x < b.x + (b.width || b.size) &&
        a.x + a.width > b.x &&
        a.y < b.y + (b.height || b.size) &&
        a.y + a.height > b.y
      );
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "white";
      ctx.font = "30px Arial";
      ctx.textAlign = "center";
      ctx.fillText("GAME OVER", canvas.width / 2, 180);
      ctx.font = "20px Arial";
      ctx.fillText("Skor Akhir: " + score, canvas.width / 2, 220);
    }

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawRoad();
      drawPlayer();
      drawObstacles();
      drawGreenItems();
      updateObjects();

      if (gameOver) {
        drawGameOver();
      } else {
        requestAnimationFrame(gameLoop);
      }
    }

    setInterval(() => {
      if (!gameOver) createObstacle();
    }, 1200);

    setInterval(() => {
      if (!gameOver) createGreenItem();
    }, 2000);

    function restartGame() {
      score = 0;
      life = 3;
      gameOver = false;
      obstacles.length = 0;
      greenItems.length = 0;
      player.x = 380;
      document.getElementById("score").textContent = score;
      document.getElementById("life").textContent = life;
      gameLoop();
    }

    gameLoop();
  </script>
</body>
</html>
